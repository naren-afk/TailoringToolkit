<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle with Gradient -->
  <defs>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  
  <circle cx="256" cy="256" r="256" fill="url(#backgroundGradient)"/>
  
  <!-- Main Scissors Icon -->
  <g transform="translate(128, 128)" filter="url(#shadow)">
    <!-- Left Blade -->
    <ellipse cx="64" cy="70" rx="28" ry="32" fill="white" opacity="0.95"/>
    <ellipse cx="64" cy="70" rx="20" ry="24" fill="#4f46e5"/>
    <circle cx="64" cy="70" r="12" fill="white"/>
    <circle cx="64" cy="70" r="8" fill="#3730a3"/>
    
    <!-- Right Blade -->
    <ellipse cx="192" cy="186" rx="28" ry="32" fill="white" opacity="0.95"/>
    <ellipse cx="192" cy="186" rx="20" ry="24" fill="#4f46e5"/>
    <circle cx="192" cy="186" r="12" fill="white"/>
    <circle cx="192" cy="186" r="8" fill="#3730a3"/>
    
    <!-- Pivot Point -->
    <circle cx="128" cy="128" r="8" fill="white"/>
    <circle cx="128" cy="128" r="5" fill="#fbbf24"/>
    
    <!-- Blade Edges -->
    <path d="M80 85L120 120L180 175" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <path d="M80 55L120 136L180 195" stroke="white" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Handle Details -->
    <path d="M50 60C45 60 40 65 40 70C40 75 45 80 50 80" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M206 176C211 176 216 181 216 186C216 191 211 196 206 196" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
    
    <!-- Decorative Screws -->
    <circle cx="58" cy="70" r="3" fill="#3730a3"/>
    <circle cx="198" cy="186" r="3" fill="#3730a3"/>
    
    <!-- Cutting Action Lines -->
    <g opacity="0.7">
      <path d="M100 110L140 110" stroke="white" stroke-width="3" stroke-linecap="round" stroke-dasharray="8,8"/>
      <path d="M110 120L150 120" stroke="white" stroke-width="3" stroke-linecap="round" stroke-dasharray="8,8"/>
      <path d="M120 130L160 130" stroke="white" stroke-width="3" stroke-linecap="round" stroke-dasharray="8,8"/>
    </g>
  </g>
  
  <!-- Decorative Elements -->
  <g opacity="0.4">
    <!-- Thread Spools -->
    <g transform="translate(80, 350)">
      <ellipse cx="0" cy="0" rx="15" ry="25" fill="white"/>
      <ellipse cx="0" cy="0" rx="10" ry="20" fill="#fbbf24"/>
      <path d="M-10 -15L-10 15" stroke="white" stroke-width="2"/>
      <path d="M10 -15L10 15" stroke="white" stroke-width="2"/>
    </g>
    
    <g transform="translate(150, 370)">
      <ellipse cx="0" cy="0" rx="12" ry="20" fill="white"/>
      <ellipse cx="0" cy="0" rx="8" ry="15" fill="#10b981"/>
      <path d="M-8 -12L-8 12" stroke="white" stroke-width="2"/>
      <path d="M8 -12L8 12" stroke="white" stroke-width="2"/>
    </g>
    
    <!-- Pins -->
    <g transform="translate(380, 120)">
      <circle cx="0" cy="0" r="3" fill="white"/>
      <circle cx="15" cy="10" r="3" fill="white"/>
      <circle cx="30" cy="5" r="3" fill="white"/>
      <circle cx="45" cy="15" r="3" fill="white"/>
    </g>
    
    <!-- Measuring Tape -->
    <g transform="translate(50, 100)">
      <path d="M0 0Q20 10 40 0Q60 -10 80 0" stroke="white" stroke-width="4" fill="none"/>
      <g font-family="Arial" font-size="8" fill="white">
        <text x="10" y="-2">1</text>
        <text x="30" y="8">2</text>
        <text x="50" y="-2">3</text>
        <text x="70" y="8">4</text>
      </g>
    </g>
    
    <!-- Fabric Pattern -->
    <g transform="translate(350, 250)">
      <path d="M0 0L20 20M20 0L0 20M40 0L60 20M60 0L40 20" stroke="white" stroke-width="2" opacity="0.6"/>
      <path d="M0 40L20 60M20 40L0 60M40 40L60 60M60 40L40 60" stroke="white" stroke-width="2" opacity="0.6"/>
    </g>
    
    <!-- Button -->
    <g transform="translate(400, 350)">
      <circle cx="0" cy="0" r="12" fill="white"/>
      <circle cx="0" cy="0" r="8" fill="#3730a3"/>
      <circle cx="-3" cy="-3" r="1.5" fill="white"/>
      <circle cx="3" cy="-3" r="1.5" fill="white"/>
      <circle cx="-3" cy="3" r="1.5" fill="white"/>
      <circle cx="3" cy="3" r="1.5" fill="white"/>
    </g>
    
    <!-- Seam Lines -->
    <path d="M300 100C320 120 340 140 360 160" stroke="white" stroke-width="2" stroke-dasharray="4,4"/>
    <path d="M320 80C340 100 360 120 380 140" stroke="white" stroke-width="2" stroke-dasharray="4,4"/>
  </g>
  
  <!-- Border Ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="white" stroke-width="4" opacity="0.3"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>
  
  <!-- Inner Glow -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#backgroundGradient)" stroke-width="1" opacity="0.5"/>
</svg>
